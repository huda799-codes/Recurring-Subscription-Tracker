<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Tracker</title>

    <style>
        /* ---------- GLOBAL ---------- */
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: #0f172a;
            color: white;
        }

        .container {
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        /* ---------- NAV ---------- */
        nav {
            display: flex;
            justify-content: space-around;
            background: #1e293b;
            padding: 15px;
        }

        nav button {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        nav button:hover {
            color: #38bdf8;
        }

        /* ---------- CARDS ---------- */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        /* ---------- FORM ---------- */
        form {
            display: grid;
            gap: 10px;
        }

        input, select, button {
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #38bdf8;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        /* ---------- TABLE ---------- */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #334155;
            text-align: center;
        }

        .action-btn {
            margin: 2px;
            padding: 5px 10px;
            cursor: pointer;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 600px) {
            table {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

<nav>
    <button onclick="showSection('dashboard')">Dashboard</button>
    <button onclick="showSection('add')">Add Subscription</button>
    <button onclick="showSection('list')">Subscription List</button>
</nav>

<div class="container">

    <!-- DASHBOARD -->
    <div id="dashboard">
        <div class="cards">
            <div class="card" id="monthlyCard"></div>
            <div class="card" id="yearlyCard"></div>
            <div class="card" id="totalCard"></div>
            <div class="card" id="annualCard"></div>
            <div class="card full-width" id="upcomingCard"></div>
        </div>
    </div>

    <!-- ADD FORM -->
    <div id="add" style="display:none;">
        <h2>Add Subscription</h2>
        <form id="subscriptionForm">
            <input type="text" id="name" placeholder="Service Name" required>
            <input type="number" id="amount" placeholder="Amount" required>
            <input type="text" id="category" placeholder="Category" required>

            <select id="cycle">
                <option value="Monthly">Monthly</option>
                <option value="Yearly">Yearly</option>
            </select>

            <input type="date" id="date" required>

            <button type="submit">Save Subscription</button>
        </form>
    </div>

    <!-- LIST -->
    <div id="list" style="display:none;">
        <h2>All Subscriptions</h2>
        <table>
            <thead>
            <tr>
                <th>Name</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Cycle</th>
                <th>Next Billing</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

</div>

<script>
    let subscriptions = JSON.parse(localStorage.getItem('subs')) || [];
    let editIndex = null;

    function showSection(section) {
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('add').style.display = 'none';
        document.getElementById('list').style.display = 'none';
        document.getElementById(section).style.display = 'block';

        if(section === 'dashboard') updateDashboard();
        if(section === 'list') renderTable();
    }

    /* ---------- SAVE ---------- */
    document.getElementById('subscriptionForm').addEventListener('submit', function(e){
        e.preventDefault();

        const sub = {
            name: name.value,
            amount: parseFloat(amount.value),
            category: category.value,
            cycle: cycle.value,
            date: date.value
        };

        if(editIndex !== null){
            subscriptions[editIndex] = sub;
            editIndex = null;
        } else {
            subscriptions.push(sub);
        }

        localStorage.setItem('subs', JSON.stringify(subscriptions));
        this.reset();
        showSection('list');
    });

    /* ---------- TABLE ---------- */
    function renderTable(){
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        subscriptions.forEach((sub, index) => {
            tbody.innerHTML += `
            <tr>
                <td>${sub.name}</td>
                <td>${sub.amount}</td>
                <td>${sub.category}</td>
                <td>${sub.cycle}</td>
                <td>${sub.date}</td>
                <td>
                    <button class="action-btn" onclick="editSub(${index})">Edit</button>
                    <button class="action-btn" onclick="deleteSub(${index})">Delete</button>
                </td>
            </tr>`;
        });
    }

    /* ---------- EDIT ---------- */
    function editSub(index){
        const sub = subscriptions[index];

        name.value = sub.name;
        amount.value = sub.amount;
        category.value = sub.category;
        cycle.value = sub.cycle;
        date.value = sub.date;

        editIndex = index;
        showSection('add');
    }

    /* ---------- DELETE ---------- */
    function deleteSub(index){
        subscriptions.splice(index, 1);
        localStorage.setItem('subs', JSON.stringify(subscriptions));
        renderTable();
    }

    /* ---------- DASHBOARD ---------- */
    function updateDashboard(){
        let monthlyCount = 0, yearlyCount = 0;
        let monthlyTotal = 0, yearlyTotal = 0;

        const today = new Date();
        let upcoming = [];

        subscriptions.forEach(sub => {
            if(sub.cycle === 'Monthly'){
                monthlyCount++;
                monthlyTotal += sub.amount;
            } else {
                yearlyCount++;
                yearlyTotal += sub.amount;
            }

            const billDate = new Date(sub.date);
            const diff = Math.ceil((billDate - today) / (1000*60*60*24));

            if(diff >= 0 && diff <= 7){
                upcoming.push(`${sub.name} - ${diff} days`);
            }
        });

        document.getElementById('monthlyCard').innerHTML =
            `<h3>Monthly Subscriptions</h3>
            Count: ${monthlyCount}<br>
            Amount: ${monthlyTotal}`;

        document.getElementById('yearlyCard').innerHTML =
            `<h3>Yearly Subscriptions</h3>
            Count: ${yearlyCount}<br>
            Amount: ${yearlyTotal}`;

        document.getElementById('totalCard').innerHTML =
            `<h3>Total Active</h3>
            ${monthlyCount + yearlyCount}`;

        document.getElementById('annualCard').innerHTML =
            `<h3>Total Annual Cost</h3>
            ${(monthlyTotal * 12) + yearlyTotal}`;

        document.getElementById('upcomingCard').innerHTML =
            `<h3>Upcoming (7 Days)</h3>
            ${upcoming.length ? upcoming.join('<br>') : 'No upcoming renewals'}`;
    }

    /* ---------- INIT ---------- */
    updateDashboard();
</script>

</body>
</html>l>
