<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SubTrack Pro | Intelligent Subscription Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="bg-ambient"></div>
<div class="app">
    <!-- SIDEBAR: Vertical Navigation with Icons -->
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
            <h2>Sub<span>Tracker</span></h2>
        </div>
        <nav class="nav-menu">
            <div class="nav-item active" data-page="dashboard">
                <i class="fas fa-tachometer-alt"></i><span>Dashboard</span>
            </div>
            <div class="nav-item" data-page="subscriptions">
                <i class="fas fa-credit-card"></i><span>Subscriptions</span>
            </div>
            <div class="nav-item" data-page="analytics">
                <i class="fas fa-chart-pie"></i><span>Analytics</span>
            </div>
            <div class="nav-item" data-page="insights">
                <i class="fas fa-brain"></i><span>AI Insights</span>
            </div>
            <div class="nav-item" data-page="reminders">
                <i class="fas fa-bell"></i><span>Reminders</span>
            </div>
        </nav>
        <div class="sidebar-footer">
            <div class="user-card">
                <img src="https://ui-avatars.com/api/?background=3B82F6&color=fff&name=Alex+Parker" alt="avatar">
                <div class="user-info">
                    <h4>Alex Parker</h4>
                    <p>Premium Member</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN CENTER CONTENT -->
    <main class="main-content">
        <header class="top-bar">
            <div class="greeting">
                <h1 id="pageTitle">Dashboard</h1>
                <p id="greetingMsg">Welcome back, Alex ✨</p>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="notificationBtn">
                    <i class="fas fa-bell"></i>
                    <span class="badge" id="reminderBadge">0</span>
                </button>
                <button class="btn-primary" id="addSubBtn"><i class="fas fa-plus"></i> Add Subscription</button>
            </div>
        </header>
        <div id="pageContainer" class="page-container">
            <!-- Dashboard content loads here dynamically -->
        </div>
    </main>
</div>

<!-- MODAL -->
<div id="subscriptionModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle"><i class="fas fa-plus-circle"></i> Add Subscription</h3>
            <button class="close-modal">&times;</button>
        </div>
        <form id="subscriptionForm">
            <div class="form-group"><label>Service Name</label><input type="text" id="subName" placeholder="Netflix, Spotify..." required></div>
            <div class="form-row">
                <div class="form-group"><label>Amount ($)</label><input type="number" step="0.01" id="subAmount" required></div>
                <div class="form-group"><label>Category</label><select id="subCategory"><option>Entertainment</option><option>Software</option><option>Music</option><option>Cloud</option><option>Productivity</option></select></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Billing Cycle</label><select id="subCycle"><option>Monthly</option><option>Yearly</option><option>Quarterly</option></select></div>
                <div class="form-group"><label>Next Renewal</label><input type="date" id="subRenewal" required></div>
            </div>
            <div class="modal-buttons"><button type="button" class="btn-secondary close-modal-btn">Cancel</button><button type="submit" class="btn-primary">Save</button></div>
        </form>
    </div>
</div>
<div id="toastMsg" class="toast-message"></div>

<script src="script.js"></script>
</body>
</html>
