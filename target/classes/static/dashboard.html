<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaveX | Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="dashboard-layout">

    <aside class="sidebar">

        <div class="sidebar-scroll-area">

            <div class="sidebar-logo">
                <div class="logo-box">
                    <i class="fa-solid fa-chart-line"></i>
                </div>

                <h2>Save<span>X</span></h2>
            </div>

            <nav class="sidebar-menu">
                <button type="button" class="menu-item active" data-page="dashboard">
                    <i class="fa-solid fa-gauge-high"></i>
                    <span>Dashboard</span>
                </button>

                <button type="button" class="menu-item" data-page="subscriptions">
                    <i class="fa-solid fa-credit-card"></i>
                    <span>Subscriptions</span>
                </button>

                <button type="button" class="menu-item" data-page="analytics">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>Analytics</span>
                </button>

                <button type="button" class="menu-item" data-page="insights">
                    <i class="fa-solid fa-brain"></i>
                    <span>AI Insights</span>
                </button>

                <button type="button" class="menu-item" data-page="reminders">
                    <i class="fa-solid fa-bell"></i>
                    <span>Reminders</span>
                </button>
            </nav>

            <div class="sidebar-bottom">

                <div class="profile-card">
                    <div class="profile-avatar" id="profileAvatar">SX</div>

                    <div>
                        <h4 id="profileName">SaveX User</h4>
                        <p>Premium Member</p>
                    </div>
                </div>

                <button type="button" class="logout-btn" id="logoutBtn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Logout
                </button>

            </div>

        </div>

    </aside>

    <main class="main-panel">

        <header class="top-header">

            <div>
                <p class="eyebrow">SaveX command center</p>
                <h1 id="pageTitle">Dashboard</h1>
                <p id="welcomeText">Welcome back ✨</p>
            </div>

            <div class="top-actions">
                <button type="button" class="notification-btn" id="notificationBtn">
                    <i class="fa-solid fa-bell"></i>
                    <span id="notificationBadge">0</span>
                </button>

                <button type="button" class="primary-btn" id="openModalBtn">
                    <i class="fa-solid fa-plus"></i>
                    Add Subscription
                </button>
            </div>

        </header>

        <section id="pageContent"></section>

    </main>

</div>

<div class="modal" id="subscriptionModal">

    <div class="modal-header">
        <h3 id="modalTitle">
            <i class="fa-solid fa-plus-circle"></i>
            Add Subscription
        </h3>

        <button type="button" id="closeModalBtn">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>


    <div class="form-group">
        <label for="serviceName">Service Name</label>
        <input id="serviceName" placeholder="Netflix, Spotify, Adobe..." required type="text">
    </div>

    <div class="form-row">

        <div class="form-group">
            <label for="serviceAmount">Amount</label>
            <input type="number" id="serviceAmount" min="1" step="0.01" placeholder="15.99" required>
        </div>

        <div class="form-group">
            <label for="serviceCategory">Category</label>
            <select id="serviceCategory" required>
                <option value="Entertainment">Entertainment</option>
                <option value="Music">Music</option>
                <option value="Software">Software</option>
                <option value="Productivity">Productivity</option>
                <option value="Education">Education</option>
                <option value="Gaming">Gaming</option>
                <option value="Cloud">Cloud</option>
                <option value="Other">Other</option>
            </select>
        </div>

    </div>

    <div class="form-row">

        <div class="form-group">
            <label for="serviceCycle">Billing Cycle</label>
            <select id="serviceCycle" required>
                <option value="Monthly">Monthly</option>
                <option value="Yearly">Yearly</option>
                <option value="Quarterly">Quarterly</option>
            </select>
        </div>

        <div class="form-group">
            <label for="serviceRenewal">Next Billing Date</label>
            <input type="date" id="serviceRenewal" required>
        </div>

    </div>

    <div class="modal-actions">
        <button type="button" class="secondary-btn" id="cancelModalBtn">Cancel</button>

        <button type="submit" class="primary-btn">
            <i class="fa-solid fa-floppy-disk"></i>
            Save
        </button>
    </div>

</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
